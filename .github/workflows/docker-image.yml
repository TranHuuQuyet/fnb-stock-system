name: CI and Docker Images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: tranhuuquyet

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./backend
        run: npm run prisma:generate

      - name: Run backend tests
        working-directory: ./backend
        run: npm test -- --runInBand

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test

      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1
        run: npm run build

      - name: Prepare production env templates
        run: |
          cp backend/.env.production.example backend/.env.production
          cp frontend/.env.production.example frontend/.env.production

      - name: Validate production compose
        run: docker compose --env-file .env.production.compose.example -f docker-compose.prod.yml config

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/fnb-stock-backend
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag
            type=match,pattern=v(.*),group=1

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          target: runner
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/fnb-stock-frontend
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag
            type=match,pattern=v(.*),group=1

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api/v1
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release metadata artifact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p release-metadata
          cat <<EOF > release-metadata/release-metadata.md
          # Release Metadata

          - Release tag: ${GITHUB_REF_NAME}
          - Commit SHA: ${GITHUB_SHA}
          - Backend image tags:
            ${BACKEND_TAGS}
          - Frontend image tags:
            ${FRONTEND_TAGS}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
        env:
          BACKEND_TAGS: ${{ steps.backend-meta.outputs.tags }}
          FRONTEND_TAGS: ${{ steps.frontend-meta.outputs.tags }}

      - name: Upload release metadata artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ github.ref_name }}
          path: release-metadata/release-metadata.md
