services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fnb_stock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d fnb_stock']
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fnb_stock?schema=public
      JWT_SECRET: super-secret-change-me
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: refresh-secret-change-me
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      APP_TIMEZONE: Asia/Ho_Chi_Minh
      TRUST_PROXY: 1
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
    ports:
      - '3001:3000'

volumes:
  postgres_data:
